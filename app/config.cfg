[objectnav]
# Detector model:
#   gdino
#   yoloev8n / yoloev8s / yoloev8m / yoloev8l / yoloev8x
model = gdino

# Detection prompt and thresholds
caption = black box
box_threshold = 0.55
text_threshold = 0.85

# Input topics
topic_image = /camera/go2/front/image_raw
topic_visual_points = /visual_points/cam_front_lidar
topic_points = /lidar_points

# Sync and frame gating
sync_slop = 0.05
sync_queue_size = 1
max_lidarimage_delay = 0.6
max_tolerate_delay = 0.0
max_infer_fps = 1.0

# Point cloud filtering and clustering
min_points = 5
mask_dilate_px = 2
u_field = u
v_field = v
cluster_grid_size = 0.2
cluster_dense_threshold = 100
cluster_min_cell_sparse = 2
cluster_min_points_sparse = 5
cluster_min_cell_dense = 5
cluster_min_points_dense = 10

# TF and follow goal behavior
min_goal_dist_m = 0.4
goal_frame = map
base_frame = base_link
tf_timeout_s = 0.03

# Debug options
enable_debug_overlay = true
use_bbox_mask_only = false
debug_max_points = 500
save_debug_images = false
output_dir = /home/allgo/mydrive/get_object/output_fusion
