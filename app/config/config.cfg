[objectnav]
# Detector model:
#   gdino
#   yoloev8l / yoloev8s / yoloev8m / yoloe11l / yoloe11m / yoloe11s
model = yoloe11l

# Detection prompt and thresholds
caption = black box
box_threshold = 0.55
text_threshold = 0.55

# Input topics
topic_image = /camera/go2/front/image_raw
topic_visual_points = /visual_points/cam_front_lidar
topic_points = /lidar_points

# Sync and frame gating
sync_slop = 0.05
sync_queue_size = 1
max_lidarimage_delay = 0.6
max_tolerate_delay = 0.0
max_infer_fps = 0.0

# Point cloud filtering and clustering
min_points = 5
mask_dilate_px = 2
u_field = u
v_field = v
cluster_grid_size = 0.2
cluster_dense_threshold = 100
cluster_min_cell_sparse = 2
cluster_min_points_sparse = 5
cluster_min_cell_dense = 5
cluster_min_points_dense = 10

# TF and follow goal behavior
min_goal_dist_m = 0.5
goal_frame = map
base_frame = base_link
tf_timeout_s = 0.03

# Recovery behavior
recovery_move_after_s = 5.0
recovery_rotate_after_s = 10.0
recovery_cancel_after_s = 20.0
recovery_rotate_interval_s = 2.0
recovery_forward_dist_m = 2.0
recovery_rotate_deg = 90.0
recovery_tick_hz = 10.0

# Debug options
enable_debug_overlay = true
use_bbox_mask_only = false
debug_max_points = 200
save_debug_images = false
output_dir = /home/allgo/mydrive/get_object/output_fusion
